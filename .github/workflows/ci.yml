name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python:
    name: Python Fast Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run fast tests
        run: uv run pytest tests/test_output_format.py tests/test_ingest/test_chunker.py tests/test_ingest/test_source_parser.py -q
